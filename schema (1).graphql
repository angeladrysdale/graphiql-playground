  """The time period over which this cap applies."""
  period: FrequencyCapPeriod!
}

"""Frequency control settings for impression capping on a deal."""
type FrequencyControls {
  """The frequency cap rules. Required when mode is ENABLED."""
  criteria: [FrequencyCap!]

  """The operating mode for frequency controls."""
  mode: FrequencyControlMode!
}

"""The timestamp and version at the last synchronization with an external platform."""
type LastSync {
  """The date and time of the last synchronization."""
  syncTime: DateTime!

  """The version identifier at the time of synchronization."""
  version: String!
}

"""A workflow lock that restricts modifications to a deal."""
type ProtectedWorkflowSource {
  """The identifier of the protected workflow source."""
  id: String!
}

"""Publisher-side terms governing deal behavior in the auction."""
type SellerTerms {
  """Whether this deal should compete with open market demand."""
  shouldCompeteWithOpenMarket: Boolean!

  """Whether this deal is a Programmatic Guaranteed commitment."""
  isProgrammaticGuaranteed: Boolean!

  """Serving priority relative to other deals. Lower values are higher priority. Must be non-negative."""
  priority: Int!

  """Whether the deal ID should be returned in the publisher-side bid response."""
  shouldReturnDealIdInPublisherResponse: Boolean!

  """Revenue share override adjustment, or null if using default terms."""
  revShareOverride: DealPriceAdjustment

  """Whether publisher-level advertiser and category blocks should be bypassed for this deal."""
  shouldSkipBlocks: Boolean!
}

"""A set of targeting values with a logical operator."""
type TargetingSet {
  """The logical operator for combining values."""
  operator: TargetingSetOperator!

  """The targeting values in this set. At least one value is required."""
  values: [TargetingValue!]!
}

"""A single targeting value within a targeting set."""
type TargetingValue {
  """The human-readable label for this targeting value."""
  label: String!

  """The targeting value used for matching. Must be non-empty."""
  value: String!
}

