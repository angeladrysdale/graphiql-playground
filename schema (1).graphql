"""Queries for the Deals domain."""
type DealQueries {
  """
  Retrieve a single deal by ID. Returns the deal regardless of status
  (including deactivated deals). Returns null if the deal does not exist.
  """
  get(id: ID!): Deal

  """
  List deals with filtering, sorting, and pagination.
  By default, excludes DEACTIVATED deals. Use the status filter to include them.
  """
  list(
    """Filter criteria for narrowing results."""
    filter: DealFilterInput
    """Pagination parameters."""
    pagination: PaginationInput
    """Sort order for the results."""
    sort: DealSortInput
  ): DealPage!
}

# -----------------------------------------------------------------------------
# Mutation Namespace
# -----------------------------------------------------------------------------

"""Mutations for the Deals domain."""
type DealMutations {
  """
  Create a new deal. The classification determines which fields are required,
  optional, or forbidden. The deal is created with version 1.
  """
  create(input: CreateDealInput!): CreateDealResponse!

  """
  Create a Class 5 Deal with Marketplaces. Classification is set automatically.
  Owner must be a publisher; buyers must be marketplaces. Pacing is not applicable.
  """
  createDealWithMarketplaces(input: CreateDealWithMarketplacesInput!): CreateDealResponse!

  """
  Create a Class 1 Direct Deal with Buyer. Classification is set automatically.
  Owner must be a publisher; buyers must be DSPs. Seller terms are required.
  """
  createDirectDeal(input: CreateDirectDealInput!): CreateDealResponse!

  """
  Create a Class 4 Marketplace Package with Buyer. Classification is set automatically.
  Owner must be a marketplace; buyers must be DSPs. Seller terms are not applicable.
  """
  createMarketplacePackage(input: CreateMarketplacePackageInput!): CreateDealResponse!

  """
  Deactivate a deal. Transitions from any non-terminal status to DEACTIVATED.
  This is a terminal operation and cannot be reversed.
  """
  deactivate(dealId: ID!): DeactivateDealResponse!

  """
  Pause an active deal. Transitions from ACTIVE to PAUSED.
  The deal retains its configuration but stops serving impressions.
  """
  pause(dealId: ID!): PauseDealResponse!

  """
  Process sync data received from a buyer's external platform.
  Updates the deal's sync information with the buyer's reference IDs and version.
  """
  receiveBuyerSync(dealId: ID!, input: ReceiveBuyerSyncInput!): ReceiveBuyerSyncResponse!

  """
  Resume a paused or auto-paused deal. Transitions from PAUSED or AUTO_PAUSED to ACTIVE.
  The deal's end date must not have passed.
  """
  resume(dealId: ID!): ResumeDealResponse!

  """
  Push deal configuration to a buyer's external platform.
  Creates or updates the deal's sync information with the sync timestamp and version.
  """
  syncToBuyer(dealId: ID!, buyerAccountId: ID!): SyncDealToBuyerResponse!

  """
  Update an existing deal's configuration. Requires the current version for
  optimistic concurrency control. The deal's classification cannot be changed.
  """
  update(dealId: ID!, input: UpdateDealInput!): UpdateDealResponse!

  """
  Update a Class 5 Deal with Marketplaces. Validates the deal's classification
  is DEAL_WITH_MARKETPLACES before applying changes. Pacing is not applicable.
  """
  updateDealWithMarketplaces(dealId: ID!, input: UpdateDealWithMarketplacesInput!): UpdateDealResponse!

  """
  Update a Class 1 Direct Deal. Validates the deal's classification is
  DIRECT_DEAL before applying changes.
  """
  updateDirectDeal(dealId: ID!, input: UpdateDirectDealInput!): UpdateDealResponse!

  """
  Update a Class 4 Marketplace Package. Validates the deal's classification is
  MARKETPLACE_PACKAGE before applying changes. Seller terms are not applicable.
  """
  updateMarketplacePackage(dealId: ID!, input: UpdateMarketplacePackageInput!): UpdateDealResponse!
}

