"""
A deal represents a pre-negotiated commercial agreement in programmatic advertising.
Deals define the terms — pricing, inventory access, buyer eligibility, and delivery
constraints — under which a publisher's ad inventory is made available to specific buyers.

The Deal is the aggregate root of the Deals domain. Its classification (immutable after
creation) determines which configuration fields are required, optional, or forbidden.
"""
type Deal {
  """The unique identifier for this deal."""
  id: ID!

  """The buyers eligible to participate in this deal."""
  buyers: [DealBuyer!]!

  """
  The commercial classification of this deal. Immutable after creation.
  Determines which configuration fields are required, optional, or forbidden.
  """
  classification: DealClassification!

  """Free-form description of this deal."""
  description: String

  """
  The date and time this deal stops serving, or null if open-ended.
  Must be after startDate when present.
  """
  endDate: DateTime

  """
  The external deal identifier shared with buyers in bid requests.
  Must be unique within the owner's scope.
  """
  externalDealId: String!

  """Organizational metadata tags for this deal."""
  labels: DealLabels

  """The date and time this deal was last modified."""
  lastModified: DateTime!

  """The account that owns this deal (publisher or marketplace)."""
  owner: DealAccount!

  """
  Delivery pacing and frequency control configuration.
  Optional for DIRECT_DEAL (PG only) and MARKETPLACE_PACKAGE.
  Forbidden for DEAL_WITH_MARKETPLACES.
  """
  pacing: DealPacing

  """Third-party measurement pixel references associated with this deal."""
  pixels: [DealMeasurementPixel!]

  """Pricing and auction configuration for this deal."""
  priceSettings: DealPriceSettings!

  """
  Workflow locks that restrict modifications to this deal.
  When present, callers must have the required attributes to modify the deal.
  """
  protectedWorkflowSources: [ProtectedWorkflowSource!]

  """
  Publisher-side terms for this deal.
  Required for DIRECT_DEAL. Optional for DEAL_WITH_MARKETPLACES.
  Forbidden for MARKETPLACE_PACKAGE.
  """
  sellerTerms: SellerTerms

  """The date and time this deal starts serving."""
  startDate: DateTime!

  """The current lifecycle status of this deal."""
  status: DealStatus!

  """Supply distribution configuration across publishers."""
  supplyBalancing: [DealSupplyBalancing!]

  """Synchronization state with buyer platforms."""
  syncInformation: [DealSyncInformation!]

  """Targeting rules that determine which inventory is eligible for this deal."""
  targeting: [DealTargeting!]!

  """
  Monotonically increasing version number for optimistic concurrency control.
  Increments on every mutation.
  """
  version: Int!
}

"""An account reference within the Deals domain."""
type DealAccount {
  """The unique identifier for this account."""
  accountId: ID!

  """The type of this account."""
  accountType: AccountType!

  """The display name of this account."""
  name: String!
}

"""A buyer's participation configuration in a deal."""
type DealBuyer {
  """The buyer account."""
  buyer: DealAccount!

  """How this buyer participates in the deal."""
  type: BuyerType!

  """
  Specific seat IDs within the buyer's DSP that are eligible for this deal.
  Null means all seats. Forbidden for marketplace buyers.
  """
  seatIds: [String!]
}

"""Organizational metadata tags for a deal."""
type DealLabels {
  """The advertiser associated with this deal."""
  advertiser: String

  """The agency associated with this deal."""
  agency: String

  """Custom free-form label."""
  custom: String

  """External reference identifier for cross-system correlation."""
  externalReferenceId: String

  """The salesperson responsible for this deal."""
  salesperson: String
}

"""A third-party measurement pixel reference."""
type DealMeasurementPixel {
