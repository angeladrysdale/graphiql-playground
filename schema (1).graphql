# -----------------------------------------------------------------------------

"""The root query type for the Deals domain GraphQL API."""
type Query {
  """Access deal queries."""
  deals: DealQueries!
}

"""The root mutation type for the Deals domain GraphQL API."""
type Mutation {
  """Access deal mutations."""
  deals: DealMutations!
}
