"""The type of account in the Deals domain."""
enum AccountType {
  """A demand-side platform that bids on inventory."""
  DSP

  """An intermediary account that facilitates transactions between publishers and DSPs."""
  MARKETPLACE

  """A supply-side account that owns inventory."""
  PUBLISHER
}

"""The auction model used for pricing a deal."""
enum AuctionType {
  """First-price auction — the winning bid pays its full bid amount."""
  FIRST

  """Fixed-price — the deal transacts at the configured floor price."""
  FIXED
}

"""How a buyer participates in a deal."""
enum BuyerType {
  """The buyer is a demand-side platform bidding directly."""
  DSP

  """The buyer is a marketplace acting as an intermediary."""
  MARKETPLACE
}

"""How a price adjustment amount is calculated."""
enum CalculationType {
  """The adjustment is a fixed CPM amount."""
  CPM

  """The adjustment is a percentage of the transaction value."""
  PERCENT
}

"""
The commercial classification of a deal. Determines which persona can create
it and which classification-specific configuration is required.
Immutable after creation.
"""
enum DealClassification {
  """
  Class 5 — Deal with Marketplaces.
  Layers additional terms on top of existing marketplace-level deals.
  Creators: Publisher, IX Internal. Seller terms optional; pacing forbidden.
  """
  DEAL_WITH_MARKETPLACES

  """
  Class 1 — Direct Deal with Buyer.
  A private agreement between a publisher and a specific DSP/seat.
  Creators: Publisher, IX Internal. Seller terms required; pacing optional (PG only).
  """
  DIRECT_DEAL

  """
  Class 3 — Inventory Package with Buyer.
  A curated bundle of publisher inventory offered to multiple buyers.
  Creators: IX Internal only.
  """
  INVENTORY_PACKAGE

  """
  Class 4 — Marketplace Package with Buyer.
  A marketplace-operated package with pricing margin and controls.
  Creators: Marketplace Partner, IX Internal. Seller terms forbidden; pacing optional.
  """
  MARKETPLACE_PACKAGE
}

"""The lifecycle status of a deal."""
enum DealStatus {
  """The deal is live and eligible for auction participation."""
  ACTIVE

  """The deal was automatically paused by the system (e.g., budget exhausted)."""
  AUTO_PAUSED

  """The deal has been soft-deleted. Terminal state; excluded from list results by default."""
  DEACTIVATED

  """The deal is being configured and has not yet been activated."""
  DRAFT

  """The deal's end date has passed. No longer serving impressions."""
  EXPIRED

  """The deal has been manually paused by a user and is not serving."""
  PAUSED
}

"""The time period over which a frequency cap applies."""
enum FrequencyCapPeriod {
  """Cap resets every calendar day."""
  DAY
}

"""Operating mode for frequency controls."""
enum FrequencyControlMode {
  """Frequency capping is not applied."""
  DISABLED

  """Frequency capping is actively enforced."""
  ENABLED

  """Frequency capping is tracked but not enforced (observation mode)."""
  SHADOW
}

"""The type of entity used for supply balancing distribution."""
enum SupplyBalancingType {
  """Supply is balanced across publishers."""
  PUBLISHER
}

"""Logical operator for combining targeting values within a set."""
enum TargetingSetOperator {
  """Match if any of the values in the set are present."""
  ANY_OF

  """Match if none of the values in the set are present."""
  NONE_OF
}

"""The source of targeting criteria."""
enum TargetingType {
  """Targeting criteria from custom key-value pairs."""
  CUSTOM

  """Targeting criteria from predefined Inventory Group dimensions."""
  STANDARD
}

