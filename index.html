<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>GraphiQL Playground</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body, #graphiql { height: 100vh; }
    </style>
    <link rel="stylesheet" href="https://unpkg.com/graphiql@3.9.0/graphiql.min.css" />
  </head>
  <body>
    <div id="graphiql"></div>

    <!-- Load everything via UMD from unpkg — no module resolution issues -->
    <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/graphiql@3.9.0/graphiql.min.js"></script>

    <script>
      const fetcher = GraphiQL.createFetcher({
        url: 'https://hasura.test.indexexchange.com/v1/graphql',
      });

      ReactDOM.createRoot(document.getElementById('graphiql')).render(
        React.createElement(GraphiQL, {
          fetcher,
          defaultQuery: '# Welcome! Try a query below.\nquery {\n  # your fields here\n}',
        })
      );
    </script>
  </body>
</html>
