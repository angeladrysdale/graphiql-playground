<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>GraphiQL Playground</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body, #graphiql { height: 100vh; }
    </style>
    <link
      rel="stylesheet"
      href="https://esm.sh/graphiql@3/graphiql.min.css"
    />
  </head>
  <body>
    <div id="graphiql"></div>

    <script type="module">
      import React from 'https://esm.sh/react@18';
      import { createRoot } from 'https://esm.sh/react-dom@18/client';
      import { GraphiQL } from 'https://esm.sh/graphiql@3';
      import { createGraphiQLFetcher } from 'https://esm.sh/@graphiql/toolkit';

      // ✏️ Replace with your GraphQL endpoint
      const fetcher = createGraphiQLFetcher({
        url: 'https://your-api.com/graphql',
        headers: {
          // Add any default headers here, e.g. auth tokens
          // 'Authorization': 'Bearer YOUR_TOKEN'
        }
      });

      createRoot(document.getElementById('graphiql')).render(
        React.createElement(GraphiQL, {
          fetcher,
          // Optional: pre-fill a starter query
          defaultQuery: `# Welcome! Try a query below.
query {
  # your fields here
}`,
        })
      );
    </script>
  </body>
</html>
